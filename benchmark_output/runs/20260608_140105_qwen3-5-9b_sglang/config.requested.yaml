backend:
  name: sglang
  image: sglang:latest
  extra_mounts:
  - /root/.cache/modelscope:/root/.cache/modelscope
  model_name: Qwen3.5-9B
  command_model_path: /root/.cache/modelscope/hub/models/Qwen/Qwen3.5-9B
  sglang_launcher_label: sglang serve  (推荐，sglang 0.5+)
  command:
  - sglang
  - serve
  - --model-path
  - /root/.cache/modelscope/hub/models/Qwen/Qwen3.5-9B
  - --host
  - 0.0.0.0
  - --port
  - '30000'
  - --served-model-name
  - Qwen3.5-9B
  - --tp
  - '2'
  - --mem-fraction-static
  - '0.9'
  - --context-length
  - '4096'
  docker_args:
  - --gpus
  - all
  - --shm-size
  - 16g
  - --ipc=host
  port: 30000
workload:
  profile: quick
  concurrency:
  - 1
  - 4
  input_tokens:
  - 512
  output_tokens:
  - 128
  total_requests: 32
  api: completions
  stream: true
  mode: fixed
